services:
  simple-nms:
    build: .
    container_name: simple-nms
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"          # Web UI + API + Webhook
      - "514:514/udp"    # Syslog
      - "162:162/udp"    # SNMP Trap
    volumes:
      - nms-data:/app/data
      - ./config.json:/app/config.json:ro
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  nms-data:
